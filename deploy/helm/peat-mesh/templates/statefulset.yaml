apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "peat-mesh.fullname" . }}
  labels:
    {{- include "peat-mesh.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "peat-mesh.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "peat-mesh.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "peat-mesh.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "peat-mesh.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: peat-mesh-node
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: broker
              containerPort: {{ .Values.brokerPort }}
              protocol: TCP
            - name: iroh-quic
              containerPort: {{ .Values.irohBindPort }}
              protocol: UDP
          env:
            - name: PEAT_FORMATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "peat-mesh.fullname" . }}
                  key: formation-secret
            - name: PEAT_DISCOVERY
              value: {{ .Values.discoveryMode | quote }}
            - name: PEAT_BROKER_PORT
              value: {{ .Values.brokerPort | quote }}
            - name: PEAT_IROH_BIND_PORT
              value: {{ .Values.irohBindPort | quote }}
            {{- if .Values.irohRelayUrls }}
            - name: PEAT_IROH_RELAY_URLS
              value: {{ .Values.irohRelayUrls | quote }}
            {{- end }}
            - name: RUST_LOG
              value: {{ .Values.rustLog | quote }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: broker
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: broker
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
